services:
  toaster:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Path inside the container where appsettings.json lives.
      # Change the volume mount below to point at the real file on your host.
      APPSETTINGS_PATH: /data/appsettings.json
    volumes:
      - "/path/to/your/app:/data"
    restart: unless-stopped
